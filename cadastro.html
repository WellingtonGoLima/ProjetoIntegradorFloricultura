<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Cadastro de Produtos</title>
</head>

<body class="bg-light">

    <!-- MENU -->
    <nav class="nav nav-pills nav-fill bg-dark p-3">

        <a class="nav-link text-white" href="index.html">
            HOME
        </a>

        <a class="nav-link active" aria-current="page" href="#">
            CADASTRO
        </a>

        <a class="nav-link text-white" href="login.html">
            LOGIN
        </a>

        <a class="nav-link text-white" href="compras.html">
            Compras
        </a>

    </nav>

    
    <div class="container mt-5">

        <div class="card shadow p-4">

            <h2 class="text-center mb-4">
                Cadastro de Arranjos 🌷
            </h2>

            <form>

                <!-- Nome -->
                <div class="mb-3">
                    <label class="form-label">
                        Nome do Arranjo
                    </label>

                    <input type="text"
                        id="nome"
                        class="form-control"
                        placeholder="Ex: Buquê Primavera">
                </div>

                <!-- Preço -->
                <div class="mb-3">
                    <label class="form-label">
                        Preço
                    </label>

                    <input type="number"
                        id="preco"
                        class="form-control"
                        placeholder="Ex: 150">
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Quatidade em Estoque
                    </label>

                    <input type="number"
                        id="estoque"
                        class="form-control"
                        placeholder="">
                </div>


                <!-- Categoria -->
                <div class="mb-3">
                    <label class="form-label">
                        Categoria
                    </label>

                    <select id="categoria" class="form-select">
                        <option>Rosas</option>
                        <option>Casamento</option>
                        <option>Aniversário</option>
                        <option>Romântico</option>
                    </select>
                </div>

                <!-- Descrição -->
                <div class="mb-3">
                    <label class="form-label">
                        Descrição
                    </label>

                    <textarea id="descricao" class="form-control"
                        rows="4"
                        placeholder="Descreva o arranjo..."></textarea>
                </div>

                <!-- Imagem -->
                <div class="mb-3">
                    <label class="form-label">
                        Foto do Arranjo
                    </label>

                    <input type="file"
                         id="foto"
                        class="form-control">
                </div>

                <button type="button" id="btnCadastrar" class="btn btn-success w-100">
                    Cadastrar Arranjo
                </button>

            </form>

        </div>

    </div>

    <script>

        document.addEventListener("DOMContentLoaded", function () {
        
            document.getElementById("btnCadastrar").addEventListener("click", function () {
        
                let nome = document.getElementById("nome").value;
                let preco = document.getElementById("preco").value;
                let estoque = document.getElementById("estoque").value;
                let categoria = document.getElementById("categoria").value;
                let descricao = document.getElementById("descricao").value;
                let arquivo = document.getElementById("foto").files[0];
        
                if (!nome || !preco || !estoque || !arquivo) {
                    alert("Preencha todos os campos!");
                    return;
                }
        
                let leitor = new FileReader();
        
                leitor.onerror = function () {
                    alert("Erro ao carregar imagem!");
                };
        
                leitor.onload = function () {
        
                    let produto = {
                        id: Date.now(),
                        nome: nome,
                        preco: Number(preco),
                        estoque: Number(estoque),
                        categoria: categoria,
                        descricao: descricao,
                        imagem: leitor.result
                    };
        
                    let produtos = JSON.parse(localStorage.getItem("produtos")) || [];
        
                    produtos.push(produto);
        
                    localStorage.setItem("produtos", JSON.stringify(produtos));
        
                    console.log("SALVO NO LOCALSTORAGE:", produtos);
        
                    alert("Produto cadastrado com sucesso!");
        
                    document.querySelector("form").reset();
                };
        
                try {
                    leitor.readAsDataURL(arquivo);
                } catch (e) {
                    alert("Erro ao processar imagem!");
                    console.log(e);
                }
        
            });
        
        });
        
        </script>

</body>
</html>
