<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Cadastro de Produtos</title>
</head>

<body class="bg-light">

    <!-- MENU -->
    <nav class="nav nav-pills nav-fill bg-dark p-3">

        <a class="nav-link text-white" href="index.html">
            HOME
        </a>

        <a class="nav-link active" aria-current="page" href="#">
            CADASTRO
        </a>

        <a class="nav-link text-white" href="login.html">
            LOGIN
        </a>

    </nav>

    
    <div class="container mt-5">

        <div class="card shadow p-4">

            <h2 class="text-center mb-4">
                Cadastro de Arranjos 🌷
            </h2>

            <form>

                <!-- Nome -->
                <div class="mb-3">
                    <label class="form-label">
                        Nome do Arranjo
                    </label>

                    <input type="text"
                        id="nome"
                        class="form-control"
                        placeholder="Ex: Buquê Primavera">
                </div>

                <!-- Preço -->
                <div class="mb-3">
                    <label class="form-label">
                        Preço
                    </label>

                    <input type="number"
                        id="preco"
                        class="form-control"
                        placeholder="Ex: 150">
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Quatidade em Estoque
                    </label>

                    <input type="number"
                        id="estoque"
                        class="form-control"
                        placeholder="">
                </div>


                <!-- Categoria -->
                <div class="mb-3">
                    <label class="form-label">
                        Categoria
                    </label>

                    <select id="categoria" class="form-select">
                        <option>Rosas</option>
                        <option>Casamento</option>
                        <option>Aniversário</option>
                        <option>Romântico</option>
                    </select>
                </div>

                <!-- Descrição -->
                <div class="mb-3">
                    <label class="form-label">
                        Descrição
                    </label>

                    <textarea id="descricao" class="form-control"
                        rows="4"
                        placeholder="Descreva o arranjo..."></textarea>
                </div>

                <!-- Imagem -->
                <div class="mb-3">
                    <label class="form-label">
                        Foto do Arranjo
                    </label>

                    <input type="file"
                         id="foto"
                        class="form-control">
                </div>

                <!-- Botão -->
                <button id="btnCadastrar" class="btn btn-success w-100">
                    Cadastrar Arranjo
                </button>

            </form>

        </div>

    </div>

    <script>

        
            document.getElementById("btnCadastrar").addEventListener("click", function(event){
            
                event.preventDefault();
            
                let nome = document.getElementById("nome").value;
                let preco = document.getElementById("preco").value;
                let estoque = document.getElementById("estoque").value;
                let categoria = document.getElementById("categoria").value;
                let descricao = document.getElementById("descricao").value;
            
                let fotoInput = document.getElementById("foto");
            
                let arquivo = fotoInput.files[0];
            
                if(!arquivo){
            
                    alert("Escolha uma imagem!");
                    return;
            
                }
            
                let leitor = new FileReader();
            
                leitor.onload = function(){
            
                    let produto = {
            
                        nome: nome,
                        preco: preco,
                        estoque: estoque,
                        categoria: categoria,
                        descricao: descricao,
                        imagem: leitor.result
            
                    };
            
                    let produtos =
                        JSON.parse(localStorage.getItem("produtos")) || [];
            
                    produtos.push(produto);
            
                    localStorage.setItem(
                        "produtos",
                        JSON.stringify(produtos)
                    );
            
                    alert("Produto cadastrado com sucesso!");
            
                    // limpa formulário
                    document.querySelector("form").reset();
            
                }
            
                leitor.readAsDataURL(arquivo);
            
            });
            
    
        
        </script>

</body>
</html>
