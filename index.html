<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Floricultura</title>

    <style>

        body{
            background-color: #fff5f8;
            font-family: Arial, Helvetica, sans-serif;
        }

        /* NAVBAR */
        .navbar-custom{
            background: linear-gradient(to right, #d63384, #ff69b4);
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
        }

        .navbar-brand{
            color: white;
            font-weight: bold;
            font-size: 1.5rem;
        }

        .nav-link{
            color: white !important;
            transition: 0.3s;
            border-radius: 10px;
        }

        .nav-link:hover{
            background-color: rgba(255,255,255,0.2);
        }

        /* TÍTULO */
        .titulo{
            text-align: center;
            margin-top: 40px;
            margin-bottom: 40px;
            color: #d63384;
            font-weight: bold;
        }

        /* CARDS */
        .imagem-flor{
            height: 250px;
            object-fit: cover;
        }

        .card{
            border: none;
            border-radius: 20px;
            overflow: hidden;
            transition: 0.3s;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
        }

        .card:hover{
            transform: scale(1.03);
        }

        .card-title{
            color: #d63384;
            font-weight: bold;
        }

        .btn-flor{
            background-color: #d63384;
            color: white;
            border: none;
            width: 100%;
            border-radius: 10px;
        }

        .btn-flor:hover{
            background-color: #bb1f6f;
        }

    </style>

</head>

<body>

    <!-- MENU -->
    <nav class="navbar navbar-expand-lg navbar-custom p-3">

        <div class="container">

            <a class="navbar-brand" href="#">
                🌸 Floricultura
            </a>

            <div>

                <a class="nav-link d-inline mx-2" href="#">
                    HOME
                </a>

                <a class="nav-link d-inline mx-2" href="cadastro.html">
                    CADASTRO
                </a>

                <a class="nav-link d-inline mx-2" href="login.html">
                    LOGIN
                </a>

            </div>

        </div>

    </nav>

    <!-- TÍTULO -->
    <h1 class="titulo">
        Nossos Arranjos Florais 🌷
    </h1>

    <!-- PRODUTOS -->
    <div class="container">

        <div class="row g-4" id="listaProdutos">

        </div>

    </div>


    <script>

        let produtos = JSON.parse(localStorage.getItem("produtos")) || [];
        
        let lista = document.getElementById("listaProdutos");
        
        produtos.forEach((produto, index) => {
        
            lista.innerHTML += `
        
            <div class="col-md-4">
        
                <div class="card h-100">
        
                    <img src="${produto.imagem}" 
                         class="card-img-top imagem-flor">
        
                    <div class="card-body">
        
                        <h5 class="card-title">
                            ${produto.nome}
                        </h5>
        
                        <p class="card-text">
                            ${produto.descricao}
                        </p>
        
                        <h6>
                            R$ ${produto.preco}
                        </h6>

                        <p>
                            Estoque: ${produto.estoque}
                        </p>
        
                        <p>
                            Categoria: ${produto.categoria}
                        </p>
        
                        <div class="d-flex gap-2">
        
                          
        
                            <button 
                                class="btn btn-danger"
                                onclick="excluirProduto(${index})">
        
                                Excluir
        
                            </button>
        
                        </div>
        
                    </div>
        
                </div>
        
            </div>
        
            `;
        
        });
        
        function excluirProduto(index){
        
            produtos.splice(index, 1);
        
            localStorage.setItem(
                "produtos",
                JSON.stringify(produtos)
            );
        
            location.reload();
        
        }
        
        </script>

</body>
</html>
