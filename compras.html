<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">

<title>Compras</title>
</head>

<body class="bg-light">

<nav class="nav nav-pills nav-fill bg-dark p-3">
    <a class="nav-link text-white" href="cadastro.html">CADASTRO</a>
    <a class="nav-link active" href="#">COMPRAS</a>
</nav>

<div class="container mt-5">

    <h1 class="text-center mb-4">Loja de Arranjos 🌷</h1>

    <div id="listaProdutos" class="row"></div>

</div>

<script>

function renderizarProdutos() {

    let lista = document.getElementById("listaProdutos");
    let produtos = JSON.parse(localStorage.getItem("produtos")) || [];

    lista.innerHTML = "";

    if (produtos.length === 0) {
        lista.innerHTML = "<p class='text-center'>Nenhum produto cadastrado.</p>";
        return;
    }

    produtos.forEach((produto) => {

        lista.innerHTML += `
        <div class="col-md-4 mb-4">

            <div class="card shadow h-100">

                <img src="${produto.imagem}"
                     class="card-img-top"
                     style="height:250px; object-fit:cover;">

                <div class="card-body d-flex flex-column">

                    <h5>${produto.nome}</h5>

                    <p><span class="badge bg-primary">${produto.categoria}</span></p>

                    <p>${produto.descricao}</p>

                    <p><strong>R$ ${Number(produto.preco).toFixed(2)}</strong></p>

                    <p>Estoque: <strong>${produto.estoque}</strong></p>

                    ${
                        produto.estoque > 0
                        ? `<button class="btn btn-success mt-auto w-100"
                                onclick="comprar(${produto.id})">
                                Comprar
                           </button>`
                        : `<button class="btn btn-danger mt-auto w-100" disabled>
                                Sem Estoque
                           </button>`
                    }

                </div>

            </div>

        </div>`;
    });
}

function comprar(id) {

    let produtos = JSON.parse(localStorage.getItem("produtos")) || [];

    let produto = produtos.find(p => p.id === id);

    if (!produto) {
        alert("Produto não encontrado!");
        return;
    }

    if (produto.estoque > 0) {

        produto.estoque--;

        localStorage.setItem("produtos", JSON.stringify(produtos));

        renderizarProdutos();

        alert("Compra realizada!");

    } else {
        alert("Sem estoque!");
    }
}

renderizarProdutos();

</script>

</body>
</html>
