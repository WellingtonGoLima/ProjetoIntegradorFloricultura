<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Floricultura - Login</title>

    <style>

        body{
            background: linear-gradient(to right, #ffe6f0, #fff5f8);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
        }

        .login-box{
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            width: 400px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
        }

        .titulo{
            text-align: center;
            margin-bottom: 25px;
            color: #d63384;
        }

        .btn-flor{
            background-color: #d63384;
            color: white;
            width: 100%;
            border: none;
        }

        .btn-flor:hover{
            background-color: #c2186a;
        }

    </style>

</head>

<body>

    <div class="login-box">

        <h2 class="titulo">🌸 Login</h2>

        <div class="form-floating mb-3">
            <input type="email" class="form-control" id="email" placeholder="nome@email.com">
            <label for="email">Email</label>
        </div>

        <div class="form-floating mb-4">
            <input type="password" class="form-control" id="senha" placeholder="Senha">
            <label for="senha">Senha</label>
        </div>

        <button class="btn btn-flor" onclick="logar()">
            Entrar
        </button>

    </div>


    <script>

        function logar(){
        
            
            const email = document.getElementById("email").value;
            const senha = document.getElementById("senha").value;
        
        
            if(email === "admin@gmail.com" && senha === "123"){
                localStorage.setItem("logado", "true");
        
                alert("Login realizado com sucesso");
        
            
                window.location.href = "cadastro.html";
        
            }else{
        
                alert("Email ou senha inválidos");
        
            }
        
        }
        
        </script>

</body>
</html>
